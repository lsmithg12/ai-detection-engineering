# Patronus Agent Configuration
# Optimized for Claude Pro plan token budget
#
# Claude LLM integration:
#   Agents invoke Claude Code CLI (claude -p) for reasoning tasks.
#   - Locally: uses Pro subscription OAuth (auto-detected from ~/.claude/)
#   - In CI: Claude CLI is not authenticated — agents fall back to
#     deterministic Python logic automatically. No credentials needed.
#   - Model aliases: "opus" -> claude-opus-4-6, "sonnet" -> claude-sonnet-4-6
#   - All invocations use --tools "" (no file/shell access, pure reasoning)

agents:
  intel:
    schedule: "daily"
    model: "sonnet"                # Fast model for report parsing
    max_reports: 5
    max_tokens_estimate: 50000
    web_search: true               # Enable web search when Claude CLI available
    web_search_max_reports: 3      # Max reports to fetch per run
    claude_tasks:
      - "Search web for new threat reports (WebSearch/WebFetch)"
      - "Extract MITRE techniques from raw report summaries"

  red-team:
    trigger: "intel_merge"
    model: "sonnet"
    max_scenarios_per_run: 5
    max_tokens_estimate: 30000

  blue-team:
    trigger: "intel_merge OR red_merge"
    model: "opus"                  # Best model for detection authoring
    max_detections_per_run: 5
    max_tokens_estimate: 100000
    auto_deploy_threshold: 0.90
    claude_tasks:
      - "Author Sigma detection rules from attack/benign event data"
      - "Improve rules that fail validation (F1 < threshold)"

  quality:
    schedule: "daily"
    model: "sonnet"                # Fast model for fleet analysis
    max_tokens_estimate: 40000
    claude_tasks:
      - "Analyze fleet health and recommend tuning actions"

  security:
    trigger: "every_agent_pr"
    model: "sonnet"
    max_tokens_estimate: 20000
    block_on_critical: true
    auto_fix_enabled: true
    scan_patterns_file: "autonomous/security/scan-patterns.yml"

# Infrastructure endpoints
infrastructure:
  elasticsearch:
    url: "http://localhost:9200"
    user: "elastic"
    pass: "changeme"
  kibana:
    url: "http://localhost:5601"
  splunk:
    url: "https://localhost:8089"
    user: "admin"
    pass: "BlueTeamLab1!"
  cribl:
    url: "http://localhost:9000"
    user: "admin"
    pass: "admin"
    hec_url: "http://localhost:8088"
    hec_token: "blue-team-lab-hec-token"
    pipeline: "cim_normalize"

# GitHub
github:
  repo: "lsmithg12/ai-detection-engineering"
  base_branch: "main"

# Budget tracking
budget:
  log_file: "autonomous/budget-log.jsonl"
  daily_cap_tokens: 500000
  warn_at_pct: 80
  models:
    opus: 1.0
    sonnet: 0.2
  light_mode:
    intel_max_reports: 2
    blue_max_detections: 2
    quality_skip_research: true
