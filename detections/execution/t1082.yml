title: System Information Discovery Command Burst via Suspicious Parent
id: 8c3a1f7e-4d92-4b6a-a1e3-9f2c7d5b8e01
status: experimental
description: >
  Detects a cmd.exe process executing multiple system information discovery commands
  chained together (systeminfo, whoami, hostname, ipconfig, net config, wmic os) in a
  single invocation, spawned from a process running outside standard program directories.
  This pattern is consistent with C2 agents like Fawkes performing automated host
  reconnaissance after initial execution.
author: Blue Team Detection Engineering Agent
date: 2026/03/08
references:
  - https://attack.mitre.org/techniques/T1082/
  - https://github.com/galoryber/fawkes
tags:
  - attack.discovery
  - attack.t1082
logsource:
  category: process_creation
  product: windows
detection:
  selection_shell:
    Image|endswith: '\cmd.exe'
    CommandLine|contains|all:
      - '/c'
      - 'systeminfo'
    CommandLine|contains:
      - 'whoami'
      - 'hostname'
      - 'ipconfig'
      - 'net config'
      - 'wmic os'
  filter_legitimate_parents:
    ParentImage|startswith:
      - 'C:\Program Files\'
      - 'C:\Program Files (x86)\'
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
      - 'C:\ProgramData\Microsoft\Windows Defender\'
  filter_system_account:
    User|contains: 'SYSTEM'
  condition: selection_shell and not filter_legitimate_parents and not filter_system_account
fields:
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - host.name
falsepositives:
  - System administrators running chained discovery commands from custom scripts in non-standard directories
  - Third-party monitoring or inventory tools installed outside Program Files
level: high