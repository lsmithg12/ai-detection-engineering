title: User Discovery via whoami or net Spawned from Suspicious Parent
id: 7c3a1f84-2e5d-4b9a-a1c8-9f0e6d2b3847
status: experimental
description: >
  Detects user and privilege discovery commands (whoami /all, net user) spawned from
  a parent process located outside standard Windows system directories. This pattern
  is consistent with post-exploitation activity where a C2 implant dropped into
  AppData or Temp enumerates the current user identity and group memberships.
  Fawkes C2 (run/whoami commands) exhibit this behaviour.
references:
  - https://attack.mitre.org/techniques/T1033/
  - https://github.com/galoryber/fawkes
author: Detection Engineering
date: 2026-03-21
modified: 2026-03-21
tags:
  - attack.discovery
  - attack.t1033
logsource:
  category: process_creation
  product: windows
detection:
  selection_whoami:
    process.name: 'whoami.exe'
    process.command_line|contains: '/all'
  selection_net_user:
    process.name: 'net.exe'
    process.command_line|contains|all:
      - 'user'
      - '/domain'
  filter_standard_parents:
    process.parent.executable|startswith:
      - 'C:\Windows\'
      - 'C:\Program Files\'
      - 'C:\Program Files (x86)\'
  condition: (selection_whoami or selection_net_user) and not filter_standard_parents
falsepositives:
  - Legitimate administrative scripts launched from non-standard paths (e.g., custom tooling
    in user-writable directories). Validate parent process reputation and path.
  - Deployment automation tools installed outside Program Files that invoke whoami for
    environment checks. Consider adding path-specific exclusions after baselining.
  - Security products running from AppData that perform user context checks.
level: medium
fields:
  - process.name
  - process.command_line
  - process.executable
  - process.parent.name
  - process.parent.executable
  - user.name
  - host.name