title: System Owner Discovery via Suspicious Parent Process
id: 8f3a2c1d-7e45-4b89-a3f1-9c6d5e2b0f84
name: system_owner_discovery_suspicious_parent
status: experimental
description: |
  Detects execution of system owner and privilege discovery tools (whoami /all, net user /domain)
  spawned by a process residing in a user-writable or suspicious filesystem location such as
  AppData, Temp, or ProgramData. This pattern is consistent with post-exploitation discovery
  activity performed by C2 implants like Fawkes (whoami command) executing from non-standard paths.
author: Detection Engineering Agent
date: 2026-03-21
modified: 2026-03-21
references:
  - https://attack.mitre.org/techniques/T1033/
  - https://github.com/galoryber/fawkes
tags:
  - attack.discovery
  - attack.t1033
logsource:
  category: process_creation
  product: windows
detection:
  selection_whoami_all:
    process.name: 'whoami.exe'
    process.command_line|contains: '/all'
  selection_net_domain:
    process.name: 'net.exe'
    process.command_line|contains:
      - '/domain'
  selection_suspicious_parent:
    process.parent.executable|contains:
      - '\AppData\'
      - '\Temp\'
      - '\ProgramData\'
      - '\Downloads\'
      - '\Desktop\'
  condition: (selection_whoami_all or selection_net_domain) and selection_suspicious_parent
fields:
  - process.name
  - process.command_line
  - process.executable
  - process.parent.name
  - process.parent.executable
  - user.name
  - host.name
falsepositives:
  - Legitimate administrative scripts or tooling installed under AppData that perform user/domain enumeration
  - Developer tools or IDEs (e.g., VS Code extensions, JetBrains tooling) running from AppData that invoke net.exe
  - Security scanners or vulnerability assessment tools installed in user-writable paths
level: high