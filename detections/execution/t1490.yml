title: Inhibit System Recovery via Shadow Copy Deletion or Recovery Disable
id: 8c3a1f2e-5d7b-4e9a-b1c6-3f8e2d4a7b90
status: experimental
description: >
  Detects attempts to inhibit system recovery by deleting Volume Shadow Copies
  via vssadmin or wmic, disabling Windows Recovery Environment via bcdedit,
  or resizing shadow storage to prevent restoration. Common pre-ransomware
  technique used by Fawkes C2 and other threat actors.
author: Blue Team Detection Engineering Agent
date: 2026/03/10
references:
  - https://attack.mitre.org/techniques/T1490/
  - https://github.com/galoryber/fawkes
tags:
  - attack.impact
  - attack.t1490
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin_delete:
    process.name: 'vssadmin.exe'
    process.command_line|contains|all:
      - 'delete'
      - 'shadows'
  selection_vssadmin_resize:
    process.name: 'vssadmin.exe'
    process.command_line|contains|all:
      - 'resize'
      - 'shadowstorage'
      - 'maxsize='
  selection_wmic_shadowcopy:
    process.name: 'wmic.exe'
    process.command_line|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_bcdedit_recovery:
    process.name: 'bcdedit.exe'
    process.command_line|contains|all:
      - 'recoveryenabled'
      - 'No'
  selection_bcdedit_safeboot:
    process.name: 'bcdedit.exe'
    process.command_line|contains|all:
      - '/set'
      - 'safeboot'
  selection_wbadmin:
    process.name: 'wbadmin.exe'
    process.command_line|contains|all:
      - 'delete'
      - 'catalog'
  filter_vssadmin_list:
    process.name: 'vssadmin.exe'
    process.command_line|contains: 'list'
  filter_bcdedit_bootstatuspolicy:
    process.name: 'bcdedit.exe'
    process.command_line|contains: 'bootstatuspolicy'
  condition: 1 of selection_* and not 1 of filter_*
falsepositives:
  - Legitimate disk cleanup scripts run by IT administrators
  - System imaging tools that manage shadow copies as part of backup rotation
  - OS deployment tools that modify boot configuration during provisioning
level: high