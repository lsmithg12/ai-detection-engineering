title: ARP Cache Enumeration by Suspicious Parent Process
id: a7f3c2e1-9b4d-4f8a-b6c5-d2e8f1a3b7c9
status: experimental
description: >
  Detects arp.exe invoked with cache enumeration flags (-a) from a parent process
  located outside trusted system directories. Fawkes C2 agent uses the 'arp' command
  to enumerate the local ARP cache for host discovery (T1016.001). Legitimate use
  originates from cmd.exe, powershell.exe, or Windows diagnostic tools in System32.
author: Detection Engineering
date: 2026-03-21
modified: 2026-03-21
references:
  - https://github.com/galoryber/fawkes
  - https://attack.mitre.org/techniques/T1016/001/
tags:
  - attack.discovery
  - attack.t1016.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    process.name: 'arp.exe'
    process.command_line|contains: '-a'
  filter_trusted_parents:
    process.parent.executable|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
      - 'C:\Windows\explorer.exe'
      - 'C:\Program Files\'
      - 'C:\Program Files (x86)\'
  condition: selection and not filter_trusted_parents
falsepositives:
  - Network administrators or IT staff running arp.exe from custom scripts or tools
    located outside System32 — review parent process path and user context
  - Third-party network management or monitoring agents that spawn arp.exe from
    non-standard install paths
  - Automated IT tooling (e.g., SCCM, Ansible, endpoint agents) running diagnostics
    from application directories — whitelist by parent executable if confirmed benign
fields:
  - process.executable
  - process.command_line
  - process.parent.executable
  - process.parent.name
  - user.name
  - host.name
level: medium