title: RDP Lateral Movement - Suspicious mstsc.exe Spawn, Outbound RDP Connection, or RDP File Creation
id: 8f3a1b2c-4d5e-6f7a-8b9c-0d1e2f3a4b5c
status: experimental
description: Detects indicators of programmatic RDP lateral movement across three event types — (1) mstsc.exe launched by an unusual parent process, (2) mstsc.exe establishing an outbound connection to port 3389, and (3) mstsc.exe creating .rdp files on disk. Fawkes C2 agent spawns mstsc.exe programmatically to perform lateral movement via RDP. The original rule only matched process_creation (Sysmon EID 1) and missed the subsequent network connection (EID 3) and file creation (EID 11) events generated by the same mstsc.exe session.
references:
    - https://attack.mitre.org/techniques/T1021/001/
    - https://github.com/galoryber/fawkes
author: Blue Team Detection Engineering Agent
date: 2026-03-08
modified: 2026-03-18
tags:
    - attack.lateral_movement
    - attack.t1021.001
logsource:
    product: windows
    service: sysmon
detection:
    selection_spawn:
        event.code: '1'
        process.name: 'mstsc.exe'
    filter_legitimate_parents:
        process.parent.name:
            - explorer.exe
            - mmc.exe
            - RuntimeBroker.exe
            - ServerManager.exe
            - mstsc.exe
            - rdcman.exe
            - WindowsTerminal.exe
            - cmd.exe
            - powershell.exe
            - pwsh.exe
    filter_parent_system_paths:
        process.parent.executable|startswith:
            - 'C:\Windows\System32\'
            - 'C:\Windows\SysWOW64\'
            - 'C:\Program Files\'
            - 'C:\Program Files (x86)\'
    selection_network:
        event.code: '3'
        process.name: 'mstsc.exe'
        destination.port: 3389
    selection_file:
        event.code: '11'
        process.name: 'mstsc.exe'
        file.name|endswith: '.rdp'
    condition: (selection_spawn and not filter_legitimate_parents and not filter_parent_system_paths) or selection_network or selection_file
falsepositives:
    - IT administration tools or remote management agents that programmatically launch mstsc.exe from non-standard paths
    - Custom scripts run from user profile directories that legitimately invoke RDP connections
    - Software deployment tools spawning mstsc.exe for remote configuration
    - Legitimate user-initiated RDP sessions will trigger selection_network and selection_file — tune by adding exclusions for known IT admin source hosts or user accounts
level: high
fields:
    - event.code
    - process.name
    - process.executable
    - process.command_line
    - process.parent.name
    - process.parent.executable
    - destination.ip
    - destination.port
    - file.name
    - file.path
    - user.name
    - host.name