title: Remote WMI Process Execution for Lateral Movement via wmic.exe
id: f3a1d8c2-9b47-4e6a-bc83-2d7e05a91f64
status: experimental
description: >
  Detects wmic.exe invoked with a remote /node: target and 'process call create' arguments,
  indicating WMI-based lateral movement. Fawkes C2 agent (and similar tools) use this
  technique to execute payloads on remote hosts without touching the remote filesystem
  directly. The combination of a remote node target with process creation is a high-fidelity
  signal for lateral movement.
references:
  - https://attack.mitre.org/techniques/T1021/006/
  - https://github.com/galoryber/fawkes
  - https://thedfirreport.com/2020/10/08/ryuks-use-of-wmi-and-lateral-movement/
author: Detection Engineering Agent
date: 2026-03-21
modified: 2026-03-21
tags:
  - attack.lateral_movement
  - attack.t1021.006
  - attack.execution
  - attack.t1047
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    event.code: "1"
    process.name: wmic.exe
    process.command_line|contains|all:
      - '/node:'
      - 'process'
      - 'call'
      - 'create'
  filter_sccm:
    process.parent.name:
      - CcmExec.exe
      - ccmexec.exe
      - CCMEXEC.EXE
  filter_management_tools:
    process.parent.name:
      - mmc.exe
      - wmiadap.exe
      - WinMgmt.exe
  filter_system:
    process.parent.name: WmiPrvSE.exe
    process.command_line|contains: 'process call create'
    user.name: SYSTEM
    user.domain: NT AUTHORITY
  condition: selection and not 1 of filter_*
falsepositives:
  - SCCM or Intune management agents using wmic /node with process-level queries (unlikely
    to use 'process call create' but possible in custom deployment scripts)
  - IT automation or software deployment tools invoking remote WMI process creation as
    part of authorized workflows — validate parent process and user context
  - Penetration testing or red team exercises using wmic for authorized lateral movement
  - Helpdesk or sysadmin scripts remotely starting/stopping services via wmic process create
level: high