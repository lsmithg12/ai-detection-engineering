name: Execution Detection Pack
version: "1.0.0"
description: |
  Detects malicious execution including PowerShell abuse, Windows Command Shell,
  WMI execution, service execution, and file encryption (ransomware indicators).
  Covers Fawkes run, powershell, inline-assembly, and WMI commands.
author: blue-team-agent
created: "2026-03-15"
modified: "2026-03-15"
status: mixed

