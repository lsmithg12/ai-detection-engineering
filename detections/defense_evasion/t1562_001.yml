title: AMSI Bypass via CLR Load in Unsigned Process [T1562.001]
id: dcddb389-1d5b-49a4-aa76-0c96431124f5
status: experimental
description: |
  Detects clr.dll or amsi.dll loaded by processes running from suspicious user-writable
  directories (AppData, Temp, ProgramData). Legitimate .NET hosts like powershell.exe,
  dotnet.exe, devenv.exe, and msbuild.exe are excluded. This pattern indicates a
  potential AMSI bypass where an attacker loads the CLR into a custom process to
  execute .NET assemblies while patching AMSI. Fawkes C2 uses start-clr and autopatch
  commands for this technique.
author: blue-team-agent
date: 2026-03-07
modified: 2026-03-13
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://github.com/galoryber/fawkes
tags:
  - attack.defense_evasion
  - attack.t1562.001
  - detection.fawkes
logsource:
  category: image_load
  product: windows
detection:
  selection_dll:
    event.code: '7'
    file.name:
      - amsi.dll
      - clr.dll
  selection_suspicious_path:
    process.executable|contains:
      - 'AppData'
      - 'Temp'
      - 'ProgramData'
      - 'Users\Public'
      - 'Downloads'
  filter_legitimate:
    process.name:
      - powershell.exe
      - pwsh.exe
      - dotnet.exe
      - devenv.exe
      - msbuild.exe
      - csc.exe
      - vbc.exe
      - MSBuild.exe
  condition: selection_dll and selection_suspicious_path and not filter_legitimate
fields:
  - file.name
  - process.name
  - process.executable
  - user.name
  - host.name
falsepositives:
  - Custom .NET applications deployed to user directories during development
  - Portable .NET tools run from Downloads folder by developers
level: high
