title: Threadless Process Injection - Suspicious Handle with Write Access
id: 9b0c1d2e-3f4a-5b6c-7d8e-9f0a1b2c3d4e
status: experimental
description: |
  Detects a process from a user-writable directory opening svchost.exe with
  GrantedAccess 0x1438 (PROCESS_VM_WRITE + PROCESS_VM_OPERATION but NOT
  PROCESS_CREATE_THREAD). This pattern is characteristic of threadless injection
  which overwrites DLL function pointers instead of creating remote threads.
  Matches the Fawkes C2 threadless-inject command.
references:
  - https://attack.mitre.org/techniques/T1055/012/
  - https://github.com/galoryber/fawkes
author: Detection Engineering
date: 2026/03/25
modified: 2026/03/25
tags:
  - attack.privilege_escalation
  - attack.defense_evasion
  - attack.t1055.012
  - detection.fawkes
logsource:
  product: windows
  service: sysmon
detection:
  selection:
    event.code: '10'
    winlog.event_data.GrantedAccess:
      - '0x1438'
      - '0x1430'
      - '0x143a'
  selection_target:
    winlog.event_data.TargetImage|endswith:
      - '\svchost.exe'
      - '\explorer.exe'
      - '\RuntimeBroker.exe'
  selection_suspicious_source:
    process.executable|contains:
      - '\AppData\'
      - '\Temp\'
      - '\ProgramData\'
      - '\Users\Public\'
  filter_security_products:
    process.executable|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Program Files\'
      - 'C:\Program Files (x86)\'
  filter_crash_handlers:
    process.name:
      - 'WerFault.exe'
      - 'MsMpEng.exe'
  condition: selection and selection_target and selection_suspicious_source and not filter_security_products and not filter_crash_handlers
falsepositives:
  - Security products using VM_WRITE access from non-standard install paths
level: critical
fields:
  - process.name
  - process.executable
  - winlog.event_data.GrantedAccess
  - winlog.event_data.TargetImage
  - user.name
  - host.name
