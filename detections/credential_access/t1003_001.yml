title: Suspicious LSASS Memory Access via Process Access
id: 8a7b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
status: experimental
description: >
  Detects suspicious process access to lsass.exe with access rights indicating
  memory reading capability (PROCESS_VM_READ). Excludes known legitimate
  security products and OS processes. Covers Fawkes C2 credential dumping
  and tools like Mimikatz, nanodump, and custom LSASS dumpers.
author: Blue Team Detection Engineering Agent
date: 2026/03/08
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://github.com/galoryber/fawkes
  - https://docs.microsoft.com/en-us/windows/win32/procthread/process-security-and-access-rights
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_access
  product: windows
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'
      - '0x1410'
      - '0x1438'
      - '0x143a'
      - '0x1fffff'
      - '0x1F0FFF'
      - '0x1F1FFF'
      - '0x40'
      - '0x1400'
      - '0x100000'
  filter_defender:
    SourceImage|contains:
      - '\Microsoft\Windows Defender\'
      - '\Windows Defender Advanced Threat Protection\'
  filter_security_products:
    SourceImage|contains:
      - '\CrowdStrike\'
      - '\SentinelOne\'
      - '\Carbon Black\'
      - '\Symantec\'
      - '\Trend Micro\'
      - '\ESET\'
      - '\Sophos\'
      - '\Cybereason\'
      - '\Cylance\'
  filter_os_processes:
    SourceImage|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
      - 'C:\Windows\WinSxS\'
  filter_vmware:
    SourceImage|contains: '\VMware\'
  filter_query_only:
    GrantedAccess: '0x1000'
  condition: selection and not 1 of filter_*
fields:
  - SourceImage
  - TargetImage
  - GrantedAccess
  - CallTrace
  - User
  - SourceProcessGUID
falsepositives:
  - Legitimate security products not covered by filters
  - IT asset management or inventory tools that query process metadata
  - Custom enterprise monitoring agents accessing LSASS for health checks
level: high