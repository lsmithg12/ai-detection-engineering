title: Suspicious Crontab Modification with Persistence Indicators
id: 2c3d4e5f-6a7b-8c9d-0e1f-2a3b4c5d6e7f
status: experimental
description: |
  Detects crontab invoked with a file argument pointing to a staging directory
  (/tmp, /dev/shm, /var/tmp) or crontab piped from a suspicious parent process.
  Matches the Fawkes C2 crontab persistence command which writes @reboot entries
  via file import. Note: crontab -e opens an interactive editor and does not
  expose cron content in the command line - this rule targets file-based import.
references:
  - https://attack.mitre.org/techniques/T1053/003/
  - https://github.com/galoryber/fawkes
author: Detection Engineering
date: 2026/03/25
modified: 2026/03/29
tags:
  - attack.persistence
  - attack.t1053.003
  - detection.fawkes
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    process.name: 'crontab'
  selection_suspicious_file_arg:
    process.command_line|contains:
      - '/tmp/'
      - '/dev/shm/'
      - '/var/tmp/'
  selection_suspicious_parent:
    process.parent.executable|contains:
      - '/tmp/'
      - '/dev/shm/'
      - '/var/tmp/'
  filter_automation:
    process.parent.name:
      - 'ansible-playbook'
      - 'puppet'
      - 'chef-client'
      - 'salt-minion'
  condition: selection and (selection_suspicious_file_arg or selection_suspicious_parent) and not filter_automation
falsepositives:
  - Configuration management tools staging cron files in /tmp before import
  - Administrators using temporary files for crontab batch updates
level: high
fields:
  - process.name
  - process.command_line
  - process.parent.name
  - user.name
  - host.name
