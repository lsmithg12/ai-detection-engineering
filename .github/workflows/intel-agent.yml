name: Intel Agent

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:       # Manual trigger

concurrency:
  group: intel-agent
  cancel-in-progress: true

jobs:
  intel:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r autonomous/orchestration/requirements.txt
          pip install sigma-cli

      - name: Configure git
        run: |
          git config user.name "patronus-bot"
          git config user.email "patronus-bot@users.noreply.github.com"

      - name: Run Intel Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          cd autonomous
          python -m orchestration.agent_runner --agent intel
