resolution_notes: |
  ETW (Event Tracing for Windows) process telemetry is only available via the
  Elastic Endpoint agent, which is not deployed in the current lab stack.
  Required to detect Fawkes keylogging (T1056.001 — Keylogging), reflective
  code loading (T1620), and embedded payloads (T1027.009 — Embedded Payloads).
  The process.Ext.api.name and process.Ext.api.parameters fields are Elastic
  Endpoint extensions not present in Sysmon or Windows event logs.
  Phase 3+ work: evaluate adding Elastic Endpoint to the lab, or create
  synthetic ETW events in the simulator for detection authoring purposes.
