resolution_notes: |
  No simulator support yet for Sysmon EID 25 (ProcessTampering), which fires
  when a process image is modified in memory — a key indicator of process
  hollowing and other injection techniques used by Fawkes (T1055). Requires
  Sysmon v13+ with ProcessTampering event collection enabled in the Sysmon
  config. Phase 3 work: update the simulator to generate synthetic EID 25
  events for injection scenarios, then build a Cribl raw log parser to extract
  process.name and process.executable into ECS fields.
